<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#1a1a2e;font-family:'Segoe UI',system-ui,sans-serif}
.game-container{display:flex;align-items:flex-start;gap:36px;padding:24px;background:#16213e;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.board-wrapper{position:relative;border:3px solid #0f3460;border-radius:8px;overflow:hidden;background:#0a0a23}
.board{display:grid;grid-template-columns:repeat(20,25px);grid-template-rows:repeat(20,25px)}
.cell{width:25px;height:25px;box-shadow:inset 0 0 0 1px #1a1a3e}
.cell.food{background:#f87171;box-shadow:none;border-radius:50%;animation:pulse .8s ease-in-out infinite alternate}
.snake-container{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.snake-seg{position:absolute;width:25px;height:25px;background:#4ade80}
.snake-seg.head{background:#22c55e}
.snake-seg.p1{background:#fb923c}
.snake-seg.p1.head{background:#f97316}
.snake-seg.flag-carried{box-shadow:0 0 10px #fbbf24, inset 0 0 6px #fbbf24}
.cell.obstacle{background:#5b21b6;box-shadow:none;border-radius:3px}
.speed-info{font-size:12px;color:#aabbcc;padding:4px 0}
.leaderboard{text-align:center;padding:10px;background:#0f3460;border-radius:12px;border:2px solid #1a1a4e;margin-top:12px}
.lb-entry{display:flex;justify-content:space-between;font-size:12px;color:#aabbcc;padding:4px 6px;border-bottom:1px solid #1a1a4e;align-items:center}
.lb-entry:last-child{border-bottom:none}
.lb-rank{color:#e94560;font-weight:700;min-width:24px;text-align:left}
.lb-score{font-weight:600}
.lb-highlight{background:#1a1a4e;border-radius:4px;color:#f87171}
.lb-empty{font-size:12px;color:#667788;padding:8px 0}
.cell.base-p0{background:#1a4a3e;box-shadow:none}
.cell.base-p1{background:#4a1a3e;box-shadow:none}
.cell.flag{background:#fbbf24;box-shadow:none;border-radius:4px;animation:pulse .6s ease-in-out infinite alternate}
.cell.flag-p0{background:#4ade80;box-shadow:none;border-radius:4px}
.cell.flag-p1{background:#f87171;box-shadow:none;border-radius:4px}
.cell.flag-carried{box-shadow:inset 0 0 8px #fbbf24}
.ctf-score{font-size:13px;color:#aabbcc;margin-top:4px}
@keyframes pulse{from{transform:scale(.8)}to{transform:scale(1)}
.boards{display:flex;gap:24px}
.player-panel{display:flex;flex-direction:column;align-items:center;gap:8px}
.player-label{font-size:13px;font-weight:700;color:#e94560;letter-spacing:2px}
.player-label kbd{font-size:11px;letter-spacing:0}
.sidebar{display:flex;flex-direction:column;gap:12px;min-width:160px}
h1{font-size:28px;font-weight:800;letter-spacing:6px;color:#e94560;text-align:center;text-shadow:0 0 20px rgba(233,69,96,.3)}
.score-box{background:#0f3460;border:2px solid #1a1a4e;border-radius:12px;padding:10px 20px;text-align:center}
.score-row{display:flex;gap:12px;justify-content:center}
.score-item{text-align:center;min-width:60px}
.score-item .label{font-size:10px}
.score-item .value{font-size:28px}
.label{font-size:11px;font-weight:600;letter-spacing:3px;color:#8899aa;margin-bottom:2px}
.value{font-size:36px;font-weight:700;color:#e94560;line-height:1}
.info{text-align:center;font-size:13px;color:#aabbcc;padding:10px;background:#0f3460;border-radius:12px;border:2px solid #1a1a4e}
.game-over{font-size:18px;font-weight:700;color:#f87171;margin-bottom:4px}
kbd{display:inline-block;padding:2px 7px;font-size:13px;font-family:inherit;background:#1a1a4e;border:1px solid #334466;border-radius:5px;color:#ccddee;margin:0 1px}
.controls{text-align:center;padding:10px;background:#0f3460;border-radius:12px;border:2px solid #1a1a4e}
.arrow-keys{font-size:18px;line-height:1.6;color:#ccddee}
.mode-select{text-align:center;padding:10px;background:#0f3460;border-radius:12px;border:2px solid #1a1a4e}
#modeSelect{width:100%;margin-top:6px;padding:6px 10px;font-size:14px;font-weight:600;font-family:inherit;background:#1a1a4e;border:2px solid #334466;border-radius:6px;color:#ccddee;cursor:pointer;outline:none}
#modeSelect:hover{border-color:#e94560}
#modeSelect:focus{border-color:#e94560}
.difficulty{text-align:center;padding:10px;background:#0f3460;border-radius:12px;border:2px solid #1a1a4e}
.diff-btns{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:6px}
.diff-btn{padding:5px 12px;font-size:12px;font-weight:600;font-family:inherit;background:#1a1a4e;border:2px solid #334466;border-radius:6px;color:#8899aa;cursor:pointer;transition:all .15s}
.diff-btn:hover{border-color:#e94560;color:#ccddee}
.diff-btn.active{border-color:#e94560;background:#e94560;color:#fff}
.hidden{display:none}
</style>
</head>
<body>
<div class="game-container">
  <div class="boards" id="boardsContainer"></div>
  <div class="sidebar">
    <h1>SNAKE</h1>
      <div class="mode-select">
        <p class="label">MODE</p>
        <select id="modeSelect"></select>
      </div>
    <div class="difficulty" id="diffSection">
      <p class="label">DIFFICULTY</p>
      <div class="diff-btns" id="diffBtns"></div>
    </div>
    <div class="score-box" id="scoreSection">
      <p class="label">SCORE</p>
      <p class="value" id="scoreDisplay">0</p>
      <div class="score-row hidden" id="scoreRow"></div>
    </div>
    <div class="info" id="info"><p>Press <kbd>Space</kbd> to start</p></div>
    <div class="controls">
      <p class="label">CONTROLS</p>
      <p class="arrow-keys" id="controlsText"><kbd>&uarr;&darr;&larr;&rarr;</kbd></p>
    </div>
    <div class="leaderboard hidden" id="leaderboard">
      <p class="label">LEADERBOARD</p>
      <div id="lbEntries"></div>
    </div>
  </div>
</div>

<script>
const SIZE = 20

const DIFFICULTIES = {
  easy:{label:'簡單',foodCount:1,hasObstacles:false},
  normal:{label:'普通',foodCount:2,hasObstacles:false},
  hard:{label:'困難',foodCount:3,hasObstacles:false},
  hell:{label:'地獄',foodCount:3,hasObstacles:true},
}

const DIR = { UP:{x:0,y:-1}, DOWN:{x:0,y:1}, LEFT:{x:-1,y:0}, RIGHT:{x:1,y:0} }

function getFreeSpeed(score) { return Math.max(120 - Math.floor(score / 20) * 5, 40) }
function getFreeFoodCount(score) { return 1 + Math.floor(score / 30) }
function getFreeObstacleCount(score) { return score >= 60 ? 1 + Math.floor((score - 60) / 20) : 0 }

// Speed Survival
function getSpeedSpeed(score) {
  // start 150ms; ≥120ms: -3ms/food, <120ms: -5ms/food; min 20ms
  return Math.max(150 - Math.min(score, 10) * 3 - Math.max(0, score - 10) * 5, 20)
}
function getSpeedObstacles(score) { return getSpeedSpeed(score) <= 110 }

// Leaderboard
function loadLeaderboard() {
  try { return JSON.parse(localStorage.getItem('snake_speed_lb') || '[]') }
  catch { return [] }
}
function saveLeaderboard(entry) {
  const lb = loadLeaderboard()
  lb.push(entry)
  lb.sort((a, b) => b.score - a.score)
  if (lb.length > 5) lb.length = 5
  localStorage.setItem('snake_speed_lb', JSON.stringify(lb))
}
function getRank(score) {
  const lb = loadLeaderboard()
  for (let i = 0; i < lb.length; i++) { if (score > lb[i].score) return i + 1 }
  return lb.length + 1
}
function renderLeaderboard() {
  const el = document.getElementById('lbEntries')
  if (!el) return
  const lb = loadLeaderboard()
  if (lb.length === 0) { el.innerHTML = '<div class="lb-empty">尚無記錄</div>'; return }
  el.innerHTML = lb.map((e, i) =>
    `<div class="lb-entry"><span class="lb-rank">#${i+1}</span><span class="lb-score">${e.score} 分</span><span style="font-size:10px;color:#667788">${e.speed}ms</span></div>`
  ).join('')
}

// Capture the Flag
const CTF_BASES = [
  { x: 0, y: 17, w: 3, h: 3 }, // P1 base (bottom-left)
  { x: 17, y: 0, w: 3, h: 3 }, // P2 base (top-right)
]
function initCTFFlags() {
  return [
    // 3 center flags
    { x: 9, y: 9, type: 'center', carriedBy: null, respawnTimer: 0, owner: -1 },
    { x: 10, y: 9, type: 'center', carriedBy: null, respawnTimer: 0, owner: -1 },
    { x: 9, y: 10, type: 'center', carriedBy: null, respawnTimer: 0, owner: -1 },
    // Base flags
    { x: 1, y: 18, type: 'base', carriedBy: null, respawnTimer: 0, owner: 0 },
    { x: 18, y: 1, type: 'base', carriedBy: null, respawnTimer: 0, owner: 1 },
  ]
}
function isInBase(px, py, baseIdx) {
  const b = CTF_BASES[baseIdx]
  return px >= b.x && px < b.x + b.w && py >= b.y && py < b.y + b.h
}
function encircleCheck(pl, opp) {
  if (pl.gameOver || opp.gameOver) return false
  const h = opp.snake[0]
  const dirs = [{ x: 0, y: -1 }, { x: 0, y: 1 }, { x: -1, y: 0 }, { x: 1, y: 0 }]
  for (const d of dirs) {
    const nx = h.x + d.x, ny = h.y + d.y
    if (nx < 0 || nx >= SIZE || ny < 0 || ny >= SIZE) continue
    if (obstacles.some(o => o.x === nx && o.y === ny)) continue
    if (pl.snake.some(s => s.x === nx && s.y === ny)) continue
    return false // at least one free adjacent cell
  }
  return true // fully surrounded by walls/obstacles/opponent body
}

// DOM refs
const boardsContainer = document.getElementById('boardsContainer')
const modeBtns = document.getElementById('modeBtns')
const diffBtns = document.getElementById('diffBtns')
const diffSection = document.getElementById('diffSection')
const scoreSection = document.getElementById('scoreSection')
const scoreDisplay = document.getElementById('scoreDisplay')
const scoreRow = document.getElementById('scoreRow')
const infoEl = document.getElementById('info')
const controlsText = document.getElementById('controlsText')

let mode = 'single'
let difficulty = 'easy'
let players = []
let obstacles = []
let started = false
let timer = null
let lastTick = 0
let curInt = 95
let rafId = null

// Speed survival state
let speedStartTime = null
let speedMaxSpeed = 150
let speedSaved = false

// CTF state
let ctfFlags = []
let ctfTarget = 5
let ctfWinner = null
let ctfRespawnTimers = [0, 0]
let ctfEncircleCooldown = [-1, -1]

function createBoardEl(parent) {
  const board = document.createElement('div')
  board.className = 'board'
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++) {
      const cell = document.createElement('div')
      cell.className = 'cell'; cell.dataset.x = x; cell.dataset.y = y
      board.appendChild(cell)
    }
  parent.appendChild(board)
  return board
}

function getCell(board, x, y) {
  return board.querySelector(`[data-x="${x}"][data-y="${y}"]`)
}

function makePlayer(startX, startY, dir) {
  return {
    snake:[{x:startX,y:startY}],
    foods:[],
    dir, nextDir:dir,
    score:0, gameOver:false,
  }
}

function isOccupied(pl) {
  return (x, y) => {
    if (pl.snake.some(s => s.x===x && s.y===y)) return true
    if (pl.foods.some(f => f.x===x && f.y===y)) return true
    if (obstacles.some(o => o.x===x && o.y===y)) return true
    if (mode === 'ctf') {
      const opp = players[1 - players.indexOf(pl)]
      if (opp && opp.snake.some(s => s.x===x && s.y===y)) return true
      if (ctfFlags.some(f => f.x===x && f.y===y && f.carriedBy===null)) return true
    }
    return false
  }
}

function randomFreePos(pl) {
  const occ = isOccupied(pl)
  let pos
  do { pos = {x:Math.floor(Math.random()*SIZE), y:Math.floor(Math.random()*SIZE)} }
  while (occ(pos.x, pos.y))
  return pos
}

function spawnFoods(pl) {
  let n
  if (mode === 'free') n = getFreeFoodCount(pl.score)
  else n = mode === 'single' ? DIFFICULTIES[difficulty].foodCount : 1
  while (pl.foods.length < n) pl.foods.push(randomFreePos(pl))
}

function generateObstacles(pl) {
  obstacles = []
  const hellMode = mode === 'single' && DIFFICULTIES[difficulty].hasObstacles
  const speedMode = mode === 'speed' && getSpeedObstacles(pl.score)
  if (!hellMode && mode !== 'free' && !speedMode) return
  const head = pl.snake[0]
  const ahead = new Set()
  const perpX = -pl.dir.y, perpY = pl.dir.x
  for (let fwd = 1; fwd <= 3; fwd++)
    for (let lat = -1; lat <= 1; lat++) {
      const ax = head.x + pl.dir.x * fwd + perpX * lat
      const ay = head.y + pl.dir.y * fwd + perpY * lat
      if (ax >= 0 && ax < SIZE && ay >= 0 && ay < SIZE) ahead.add(`${ax},${ay}`)
    }
  const count = mode === 'free' ? getFreeObstacleCount(pl.score) : speedMode ? 1 + Math.floor(Math.random() * 2) : 3 + Math.floor(Math.random() * 3)
  for (let i = 0; i < count; i++) {
    let pos
    do { pos = {x:Math.floor(Math.random()*SIZE), y:Math.floor(Math.random()*SIZE)} }
    while (isOccupied(pl)(pos.x, pos.y) || ahead.has(`${pos.x},${pos.y}`) || obstacles.some(o => o.x===pos.x && o.y===pos.y))
    obstacles.push(pos)
  }
}

function renderPlayer(pl, boardEl, pi) {
  for (let y = 0; y < SIZE; y++)
    for (let x = 0; x < SIZE; x++) getCell(boardEl, x, y).className = 'cell'
  pl.foods.forEach(f => getCell(boardEl, f.x, f.y).classList.add('food'))
  obstacles.forEach(o => getCell(boardEl, o.x, o.y).classList.add('obstacle'))

  const wr = boardEl.parentElement
  let c = wr.querySelector('.snake-container')
  if (!c) { c = document.createElement('div'); c.className = 'snake-container'; wr.appendChild(c) }
  while (c.children.length < pl.snake.length) { const s = document.createElement('div'); s.className = 'snake-seg'; c.appendChild(s) }
  while (c.children.length > pl.snake.length) c.removeChild(c.lastChild)
  for (let i = 0; i < pl.snake.length; i++) {
    const seg = pl.snake[i]
    c.children[i].className = `snake-seg p${pi}` + (i === 0 ? ' head' : '')
    c.children[i].style.transform = `translate(${seg.x * 25}px,${seg.y * 25}px)`
  }
}

function renderAll() {
  if (mode === 'ctf') {
    const boardEl = players[0].boardEl
    for (let y = 0; y < SIZE; y++)
      for (let x = 0; x < SIZE; x++) getCell(boardEl, x, y).className = 'cell'
    // Render bases
    CTF_BASES.forEach((b, bi) => {
      for (let dy = 0; dy < b.h; dy++)
        for (let dx = 0; dx < b.w; dx++)
          getCell(boardEl, b.x + dx, b.y + dy).classList.add(bi === 0 ? 'base-p0' : 'base-p1')
    })
    // Render flags
    ctfFlags.forEach(f => {
      if (f.carriedBy !== null) return
      const cell = getCell(boardEl, f.x, f.y)
      if (f.type === 'center') cell.classList.add('flag')
      else cell.classList.add(f.owner === 0 ? 'flag-p0' : 'flag-p1')
    })
    obstacles.forEach(o => getCell(boardEl, o.x, o.y).classList.add('obstacle'))
    // Render both snakes
    players.forEach((pl, pi) => renderSnakeCTF(pl, boardEl, pi))
  } else {
    players.forEach((pl, i) => renderPlayer(pl, pl.boardEl, i))
  }
}

function renderSnakeCTF(pl, boardEl, pi) {
  const wr = boardEl.parentElement
  let c = wr.querySelector(`.snake-container.p${pi}`)
  if (!c) {
    c = document.createElement('div')
    c.className = `snake-container p${pi}`
    c.style.zIndex = pi === 0 ? 2 : 1
    wr.appendChild(c)
  }
  while (c.children.length < pl.snake.length) { const s = document.createElement('div'); s.className = 'snake-seg'; c.appendChild(s) }
  while (c.children.length > pl.snake.length) c.removeChild(c.lastChild)
  const hasFlags = ctfFlags.some(f => f.carriedBy === pi)
  for (let i = 0; i < pl.snake.length; i++) {
    const seg = pl.snake[i]
    c.children[i].className = `snake-seg p${pi}` + (i === 0 ? ' head' : '') + (hasFlags && i === 0 ? ' flag-carried' : '')
    c.children[i].style.transform = `translate(${seg.x * 25}px,${seg.y * 25}px)`
  }
}

function rafRender(time) {
  if (started && lastTick > 0) {
    const progress = Math.min((time - lastTick) / curInt, 1)
    players.forEach((pl, pi) => {
      if (pl.gameOver || pl.snake.length === 0) return
      const sel = mode === 'ctf' ? `.snake-container.p${pi}` : '.snake-container'
      const c = pl.boardEl.parentElement.querySelector(sel)
      if (!c) return
      for (let i = 0; i < pl.snake.length; i++) {
        const seg = pl.snake[i]
        let dx = 0, dy = 0
        if (i === 0) { dx = pl.dir.x; dy = pl.dir.y }
        else { dx = pl.snake[i-1].x - seg.x; dy = pl.snake[i-1].y - seg.y }
        c.children[i].style.transform = `translate(${(seg.x + dx * progress) * 25}px,${(seg.y + dy * progress) * 25}px)`
      }
    })
  }
  rafId = requestAnimationFrame(rafRender)
}

function reset() {
  if (timer) clearTimeout(timer)
  started = false
  speedStartTime = null
  speedMaxSpeed = 150
  speedSaved = false
  ctfWinner = null
  ctfRespawnTimers = [0, 0]
  ctfEncircleCooldown = [-1, -1]
  const boardEls = players.map(p => p.boardEl)
  if (mode === 'single') {
    players = [makePlayer(10, 10, DIR.RIGHT)]
  } else if (mode === 'speed') {
    players = [makePlayer(10, 10, DIR.RIGHT)]
    generateObstacles(players[0])
  } else if (mode === 'ctf') {
    players = [
      makePlayer(1, 18, DIR.RIGHT),  // P1 bottom-left base
      makePlayer(18, 1, DIR.LEFT),   // P2 top-right base
    ]
    ctfFlags = initCTFFlags()
  } else {
    players = [
      makePlayer(5, 10, DIR.RIGHT),
      makePlayer(14, 10, DIR.LEFT),
    ]
  }
  players.forEach((pl, i) => { pl.boardEl = boardEls[i]; pl.gameOver=false; pl.score=0; if (mode !== 'ctf') spawnFoods(pl) })
  if ((mode === 'single' && DIFFICULTIES[difficulty].hasObstacles) || mode === 'free') generateObstacles(players[0])
  renderLeaderboard()
  updateUI()
  renderAll()
  infoEl.innerHTML = '<p>Press <kbd>Space</kbd> to start</p>'
}

function start() {
  started = true
  lastTick = performance.now()
  infoEl.innerHTML = ''
  tick()
}

function tick() {
  if (players.every(p => p.gameOver)) {
    started=false
    if (mode === 'ctf' && ctfWinner === null) infoEl.innerHTML = '<p class="game-over">GAME OVER</p><p style="margin-top:6px">Press <kbd>Space</kbd> to restart</p>'
    return
  }
  if (mode === 'ctf') { tickCTF(); return }
  players.forEach(pl => {
    if (pl.gameOver) return
    const head = pl.snake[0]
    const next = {x:head.x+pl.dir.x, y:head.y+pl.dir.y}

    if (next.x<0||next.x>=SIZE||next.y<0||next.y>=SIZE) { pl.gameOver=true; onGameOver(pl); return }
    if (pl.snake.some(s => s.x===next.x&&s.y===next.y)) { pl.gameOver=true; onGameOver(pl); return }
    if (obstacles.some(o => o.x===next.x&&o.y===next.y)) { pl.gameOver=true; onGameOver(pl); return }

    pl.snake.unshift(next)
    const ate = pl.foods.findIndex(f =>
      mode === 'speed' ? Math.abs(f.x - next.x) <= 1 && Math.abs(f.y - next.y) <= 1 : f.x === next.x && f.y === next.y
    )
    if (ate !== -1) {
      pl.score++
      pl.foods.splice(ate, 1)
    } else {
      pl.snake.pop()
    }
  })
  players.forEach(pl => {
    if (pl.gameOver) return
    if (pl.foods.length > 0) return
    if ((mode === 'single' && DIFFICULTIES[difficulty].hasObstacles) || mode === 'free' || mode === 'speed') generateObstacles(pl)
    spawnFoods(pl)
  })
  renderAll()
  updateUI()
  lastTick = performance.now()
  if (mode === 'free') curInt = getFreeSpeed(players[0].score)
  else if (mode === 'speed') { curInt = getSpeedSpeed(players[0].score); speedMaxSpeed = Math.min(speedMaxSpeed, curInt) }
  else curInt = 95
  timer = setTimeout(tick, curInt)
}

function onGameOver(pl) {
  if (mode !== 'speed' || speedSaved) return
  speedSaved = true
  const duration = speedStartTime ? Math.floor((performance.now() - speedStartTime) / 1000) : 0
  saveLeaderboard({ score: pl.score, timestamp: Date.now(), duration, speed: speedMaxSpeed })
  renderLeaderboard()
  const rank = getRank(pl.score)
  const total = loadLeaderboard().length
  infoEl.innerHTML = `<p class="game-over">GAME OVER</p><p style="font-size:13px">得分 ${pl.score} | 最快 ${speedMaxSpeed}ms | ${duration}s</p><p style="font-size:13px;color:#e94560">排名 #${rank} / ${total}</p><p style="margin-top:6px">Press <kbd>Space</kbd> to restart</p>`
}

// --- CTF (Capture the Flag) ---
function tickCTF() {
  // Phase 1: compute next positions
  const moves = players.map(pl => {
    if (pl.gameOver) return null
    const head = pl.snake[0]
    return {x: head.x + pl.dir.x, y: head.y + pl.dir.y}
  })

  // Phase 2: collisions (head-body, wall, obstacle)
  players.forEach((pl, i) => {
    if (pl.gameOver) return
    const next = moves[i]
    if (next.x < 0 || next.x >= SIZE || next.y < 0 || next.y >= SIZE) { ctfDie(pl, i); return }
    if (obstacles.some(o => o.x === next.x && o.y === next.y)) { ctfDie(pl, i); return }
    if (pl.snake.some(s => s.x === next.x && s.y === next.y)) { ctfDie(pl, i); return }
    const opp = players[1 - i]
    if (!opp.gameOver && opp.snake.some(s => s.x === next.x && s.y === next.y)) { ctfDie(pl, i); return }
  })

  // Phase 3: head-head collision
  if (!players[0].gameOver && !players[1].gameOver) {
    const n0 = moves[0], n1 = moves[1]
    const h0 = players[0].snake[0], h1 = players[1].snake[0]
    // Same cell or swapping cells
    if ((n0.x === n1.x && n0.y === n1.y) || (n0.x === h1.x && n0.y === h1.y && n1.x === h0.x && n1.y === h0.y)) {
      ctfDie(players[0], 0); ctfDie(players[1], 1)
    }
  }

  // Phase 4: move and flag logic
  players.forEach((pl, i) => {
    if (pl.gameOver) return
    const next = moves[i]
    pl.snake.unshift(next)

    // Pick up flag
    ctfFlags.forEach(f => {
      if (f.carriedBy !== null) return
      if (f.x === next.x && f.y === next.y) {
        if (f.type === 'base' && f.owner === i && isInBase(f.x, f.y, f.owner)) return
        f.carriedBy = i
      }
    })

    // Score flags at own base
    if (isInBase(next.x, next.y, i)) {
      ctfFlags.forEach(f => {
        if (f.carriedBy !== i) return
        if (f.type === 'center') {
          pl.score++; f.carriedBy = null
          const p = randomFreePos(players[0]); f.x = p.x; f.y = p.y; renderAll()
        } else if (f.owner !== i) {
          pl.score += 3; f.carriedBy = null
          const base = CTF_BASES[f.owner]; f.x = base.x1 + 1; f.y = base.y1 + 1; renderAll()
        } else {
          pl.score++; f.carriedBy = null
          const base = CTF_BASES[f.owner]; f.x = base.x1 + 1; f.y = base.y1 + 1; renderAll()
        }
      })
    }
    pl.snake.pop()
  })

  // Phase 5: encircle check
  players.forEach((pl, i) => {
    if (pl.gameOver) return
    const opp = players[1 - i]
    if (opp.gameOver) return
    if (ctfEncircleCooldown[i] > 0) { ctfEncircleCooldown[i]--; return }
    if (encircleCheck(pl, opp)) { pl.score++; ctfEncircleCooldown[i] = 10 }
  })

  // Phase 6: player respawn
  players.forEach((pl, i) => {
    if (pl.gameOver && ctfRespawnTimers[i] === 0) {
      const base = CTF_BASES[i]
      pl.snake = [{x: base.x + 1, y: base.y + 1}]
      pl.dir = i === 0 ? DIR.RIGHT : DIR.LEFT
      pl.gameOver = false
      ctfRespawnTimers[i] = -1
    }
    if (pl.gameOver && ctfRespawnTimers[i] === -1) ctfRespawnTimers[i] = 3
    if (ctfRespawnTimers[i] > 0) ctfRespawnTimers[i]--
  })

  // Phase 7: win check
  players.forEach((pl, i) => {
    if (ctfWinner !== null) return
    if (pl.score >= ctfTarget) {
      ctfWinner = i; started = false
      infoEl.innerHTML = `<p class="game-over">P${i+1} 獲勝!</p><p style="font-size:13px">P1: ${players[0].score} | P2: ${players[1].score}</p><p style="margin-top:6px">Press <kbd>Space</kbd> to restart</p>`
    }
  })

  renderAll(); updateUI()
  lastTick = performance.now(); curInt = 95
  if (!started) return
  timer = setTimeout(tickCTF, curInt)
}

function ctfDie(pl, pi) {
  if (pl.gameOver) return
  pl.gameOver = true
  ctfFlags.forEach(f => {
    if (f.carriedBy !== pi) return
    f.carriedBy = null
    const pos = randomFreePos(players[0]); f.x = pos.x; f.y = pos.y
  })
}

function updateUI() {
  if (mode === 'single' || mode === 'free' || mode === 'speed') {
    let html = `<div class="score-item"><p class="label">SCORE</p><p class="value">${players[0].score}</p></div>`
    if (mode === 'speed') {
      const spd = started ? getSpeedSpeed(players[0].score) : 150
      html += `<div class="score-item"><p class="label">SPEED</p><p class="value" style="font-size:22px">${spd}ms</p></div>`
    }
    scoreDisplay.classList.add('hidden')
    scoreRow.classList.remove('hidden')
    scoreRow.innerHTML = html
  } else if (mode === 'ctf') {
    scoreDisplay.classList.add('hidden')
    scoreRow.classList.remove('hidden')
    const flags0 = ctfFlags.filter(f => f.carriedBy === 0).length
    const flags1 = ctfFlags.filter(f => f.carriedBy === 1).length
    scoreRow.innerHTML = `
      <div class="score-item"><p class="label">P2 🏴${flags1}</p><p class="value">${players[1]?.score ?? 0}</p></div>
      <div class="score-item"><p class="label">目標</p><p class="value" style="font-size:22px">${ctfTarget}</p></div>
      <div class="score-item"><p class="label">P1 🏴${flags0}</p><p class="value">${players[0]?.score ?? 0}</p></div>
    `
  } else {
    scoreDisplay.classList.add('hidden')
    scoreRow.classList.remove('hidden')
    scoreRow.innerHTML = [
      { label: 'P2', score: players[1].score },
      { label: 'P1', score: players[0].score },
    ].map(item =>
      `<div class="score-item"><p class="label">${item.label}</p><p class="value">${item.score}</p></div>`
    ).join('')
  }
}

function switchMode(m) {
  if (timer) clearTimeout(timer)
  mode = m
  modeSelect.value = m
  diffSection.classList.toggle('hidden', m !== 'single')
  const dualMode = m === 'dual' || m === 'ctf'
  controlsText.innerHTML = m === 'single' || m === 'free' || m === 'speed'
    ? '<kbd>&uarr;&darr;&larr;&rarr;</kbd>'
    : '<kbd>&uarr;&darr;&larr;&rarr;</kbd>  <kbd>W A S D</kbd>'
  document.getElementById('leaderboard').classList.toggle('hidden', m !== 'speed')

  boardsContainer.innerHTML = ''
  if (m === 'single' || m === 'free' || m === 'speed') {
    const wrapper = document.createElement('div')
    wrapper.className = 'board-wrapper'
    const board = createBoardEl(wrapper)
    boardsContainer.appendChild(wrapper)
    players = [makePlayer(10, 10, DIR.RIGHT)]
    players[0].boardEl = board
  } else if (m === 'ctf') {
    // Single shared board for CTF
    const panel = document.createElement('div')
    panel.className = 'player-panel'
    const label = document.createElement('div')
    label.className = 'player-label'
    label.innerHTML = '奪旗戰 <kbd>W A S D</kbd> <kbd>&uarr;&darr;&larr;&rarr;</kbd>'
    const wrapper = document.createElement('div')
    wrapper.className = 'board-wrapper'
    const board = createBoardEl(wrapper)
    panel.appendChild(label)
    panel.appendChild(wrapper)
    boardsContainer.appendChild(panel)
    const p1 = makePlayer(1, 18, DIR.RIGHT)   // P1 at base
    const p2 = makePlayer(18, 1, DIR.LEFT)     // P2 at base
    players = [p1, p2]
    players[0].boardEl = board
    players[1].boardEl = board
  } else {
    const p1 = makePlayer(5, 10, DIR.RIGHT)
    const p2 = makePlayer(14, 10, DIR.LEFT)
    players = [p1, p2]
    const order = [1, 0]
    order.forEach(pi => {
      const panel = document.createElement('div')
      panel.className = 'player-panel'
      const label = document.createElement('div')
      label.className = 'player-label'
      label.innerHTML = `P${pi+1} ${pi===0 ? '<kbd>&uarr;&darr;&larr;&rarr;</kbd>' : '<kbd>W A S D</kbd>'}`
      const wrapper = document.createElement('div')
      wrapper.className = 'board-wrapper'
      const board = createBoardEl(wrapper)
      panel.appendChild(label)
      panel.appendChild(wrapper)
      boardsContainer.appendChild(panel)
      players[pi].boardEl = board
    })
  }
  reset()
}

// Key handling
document.addEventListener('keydown', e => {
  if (e.key === ' ') {
    e.preventDefault()
    if (started || players.some(p => p.gameOver) || ctfWinner !== null) { reset(); return }
    speedStartTime = performance.now()
    start()
    return
  }

  if (mode === 'single' || mode === 'free' || mode === 'speed') {
    const map = {ArrowUp:DIR.UP, ArrowDown:DIR.DOWN, ArrowLeft:DIR.LEFT, ArrowRight:DIR.RIGHT}
    const nd = map[e.key]
    if (nd) {
      e.preventDefault()
      if (nd.x + players[0].dir.x !== 0 || nd.y + players[0].dir.y !== 0) { players[0].dir = nd; players[0].nextDir = nd }
    }
  } else {
    // P1: arrows
    const map1 = {ArrowUp:DIR.UP, ArrowDown:DIR.DOWN, ArrowLeft:DIR.LEFT, ArrowRight:DIR.RIGHT}
    const nd1 = map1[e.key]
    if (nd1) {
      e.preventDefault()
      if (!players[0].gameOver && (nd1.x + players[0].dir.x !== 0 || nd1.y + players[0].dir.y !== 0)) { players[0].dir = nd1; players[0].nextDir = nd1 }
    }
    // P2: WASD
    const map2 = {KeyW:DIR.UP, KeyS:DIR.DOWN, KeyA:DIR.LEFT, KeyD:DIR.RIGHT}
    const nd2 = map2[e.code]
    if (nd2) {
      e.preventDefault()
      if (players[1] && !players[1].gameOver && (nd2.x + players[1].dir.x !== 0 || nd2.y + players[1].dir.y !== 0)) { players[1].dir = nd2; players[1].nextDir = nd2 }
    }
  }
})

// Build mode select
const modeNames = { single: '單人', dual: '雙人', free: '自由', speed: '速度遞增', ctf: '奪旗戰' }
const modeSelect = document.getElementById('modeSelect')
Object.entries(modeNames).forEach(([v, label]) => {
  const opt = document.createElement('option'); opt.value = v; opt.textContent = label
  modeSelect.appendChild(opt)
})
modeSelect.addEventListener('change', () => switchMode(modeSelect.value))

// Build difficulty buttons
Object.entries(DIFFICULTIES).forEach(([key, cfg]) => {
  const btn = document.createElement('button')
  btn.className = 'diff-btn'; btn.dataset.diff = key; btn.textContent = cfg.label
  btn.addEventListener('click', () => { difficulty=key; document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('active',b.dataset.diff===key)); reset() })
  diffBtns.appendChild(btn)
})

switchMode('single')
rafRender()
</script>
</body>
